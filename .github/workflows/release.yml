# Pushes a multi-arch Docker image to GHCR on every git tag of the form
# vMAJOR.MINOR.PATCH (e.g. v1.2.0). Uses GITHUB_TOKEN — no extra
# secrets to configure.
#
# To cut a release:
#   git tag v1.2.0
#   git push origin v1.2.0
#
# Image will land at:
#   ghcr.io/shekolla/daypage:v1.2.0
#   ghcr.io/shekolla/daypage:1.2.0
#   ghcr.io/shekolla/daypage:1.2
#   ghcr.io/shekolla/daypage:latest
name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/daypage
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image (linux/amd64, linux/arm64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless via OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Generate SPDX SBOM (source)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: daypage-source-sbom.spdx.json
          output-file: daypage-source-sbom.spdx.json

      - name: Attach SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: daypage-source-sbom.spdx.json
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
