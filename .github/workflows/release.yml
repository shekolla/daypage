# Pushes a multi-arch Docker image to GHCR on every git tag of the form
# vMAJOR.MINOR.PATCH (e.g. v1.2.0). Uses GITHUB_TOKEN — no extra
# secrets to configure.
#
# To cut a release:
#   git tag v1.2.0
#   git push origin v1.2.0
#
# Image will land at:
#   ghcr.io/shekolla/daypage:v1.2.0
#   ghcr.io/shekolla/daypage:1.2.0
#   ghcr.io/shekolla/daypage:1.2
#   ghcr.io/shekolla/daypage:latest
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/daypage
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image (linux/amd64, linux/arm64)
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest image build provenance (SLSA)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/daypage
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image with cosign (keyless via OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            echo "Signing ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Create SHA-256 checksums for release assets
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Download the source archives GitHub auto-creates for the tag
          curl -fsSL "https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz" \
            -o "daypage-${VERSION}.tar.gz"
          curl -fsSL "https://github.com/${REPO}/archive/refs/tags/${VERSION}.zip" \
            -o "daypage-${VERSION}.zip"
          sha256sum "daypage-${VERSION}.tar.gz" "daypage-${VERSION}.zip" > checksums.txt
          cat checksums.txt

      - name: Sign checksums with cosign (keyless)
        run: cosign sign-blob --yes --bundle checksums.txt.bundle checksums.txt

      - name: Attest checksums provenance (SLSA)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: checksums.txt

      - name: Generate SPDX SBOM (source)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          artifact-name: daypage-source-sbom.spdx.json
          output-file: daypage-source-sbom.spdx.json

      - name: Attach signed assets and SBOM to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            checksums.txt
            checksums.txt.bundle
            daypage-source-sbom.spdx.json
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}
