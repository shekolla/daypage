version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "[Deps]"
    groups:
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/scaffold"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - scaffold
    commit-message:
      prefix: "[Deps]"

  - package-ecosystem: npm
    directory: "/server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - server
    commit-message:
      prefix: "[Deps]"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - ci
    commit-message:
      prefix: "[CI]"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - docker
    commit-message:
      prefix: "[Build]"
