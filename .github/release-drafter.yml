name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Features"
    labels:
      - "enhancement"
      - "feature"
  - title: "Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Security"
    labels:
      - "security"
  - title: "Build / CI"
    labels:
      - "ci"
      - "build"
      - "docker"
  - title: "Docs"
    labels:
      - "documentation"
      - "docs"
  - title: "Dependencies"
    labels:
      - "dependencies"
    collapse-after: 5
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "enhancement"
      - "feature"
      - "minor"
  patch:
    labels:
      - "patch"
      - "bug"
      - "fix"
      - "documentation"
      - "dependencies"
  default: patch
exclude-labels:
  - "skip-changelog"
  - "no-release-notes"
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
